<div class="dashboard-wrapper">
  
  <header class="top-bar">
    <div class="menu-left">
      <div class="menu-icon" routerLink="/dashboard">
        <span class="menu-text">MENU</span>
        <div class="hamburger">
          <span></span><span></span><span></span>
        </div>
      </div>
      <h1>HOLA, {{ nombreUsuario | uppercase }}</h1> 
    </div>
    <div class="header-buttons">
      <button class="btn-nav" routerLink="/dashboard">INICIO</button>
      <button class="btn-logout" (click)="cerrarSesion()">CERRAR SESION</button>
    </div>
  </header>

  <div class="content">
    <h2>Historial de diagnóstico</h2>

    <div class="filters-container">
      <div class="filter-row">
        <button class="btn-filter" [class.active]="filtroActivo === 'HOY'" (click)="aplicarFiltro('HOY')">HOY</button>
        <button class="btn-filter" [class.active]="filtroActivo === 'ESTA SEMANA'" (click)="aplicarFiltro('ESTA SEMANA')">ESTA SEMANA</button>
        <button class="btn-filter" [class.active]="filtroActivo === 'ESTE MES'" (click)="aplicarFiltro('ESTE MES')">ESTE MES</button>
        <button class="btn-filter" [class.active]="filtroActivo === 'HACE 3 MESES'" (click)="aplicarFiltro('HACE 3 MESES')">HACE 3 MESES</button>
      </div>
      <div class="filter-row">
        <button class="btn-filter" [class.active]="filtroActivo === 'PLAZO PERSONALIZADO'" (click)="aplicarFiltro('PLAZO PERSONALIZADO')">PLAZO PERSONALIZADO</button>
        <button class="btn-filter light">DESDE</button>
        <button class="btn-filter light">HASTA</button>
      </div>
    </div>

    <div class="table-container">
      <table class="history-table">
        <thead>
          <tr>
            <th>Fecha</th>
            <th>Diagnóstico<br>(Positivo/Negativo)</th>
            <th>Enfermedad</th>
            <th>Parcela</th>
          </tr>
        </thead>
        <tbody>
          <tr *ngIf="registrosAMostrar.length === 0">
            <td colspan="4" style="padding: 20px; color: #666;">No hay registros en este período.</td>
          </tr>
          
          <tr *ngFor="let item of registrosAMostrar">
            <td>{{ item.fecha }}</td>
            <td>
              <span class="badge" 
                    [ngClass]="{'badge-positive': item.diagnostico === 'Positivo', 
                                'badge-negative': item.diagnostico === 'Negativo'}">
                {{ item.diagnostico }}
              </span>
            </td>
            <td>{{ item.enfermedad }}</td>
            <td>{{ item.parcela }}</td>
          </tr>
        </tbody>
      </table>
    </div>
