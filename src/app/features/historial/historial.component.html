<div class="app-wrapper">
  
  <!-- BARRA DE NAVEGACIÓN FLOTANTE -->
  <header class="app-nav glass-panel">
    <div class="nav-brand">
      <div class="menu-icon" routerLink="/dashboard">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><path d="M3 12h18M3 6h18M3 18h18"></path></svg>
      </div>
      <div class="greeting">
        <span class="eyebrow">REGISTRO CLÍNICO</span>
        <h1>Historial de Parcelas</h1>
      </div>
    </div>
    <div class="nav-actions">
      <button class="btn-outline-dark" routerLink="/dashboard">Volver al Inicio</button>
    </div>
  </header>

  <!-- CONTENEDOR PRINCIPAL -->
  <main class="history-shell">
    
    <!-- ZONA DE FILTROS -->
    <div class="filters-zone">
      <div class="filter-group">
        <button class="btn-neo-pill" [class.active]="filtroActivo === 'HOY'" (click)="aplicarFiltro('HOY')">Hoy</button>
        <button class="btn-neo-pill" [class.active]="filtroActivo === 'ESTA SEMANA'" (click)="aplicarFiltro('ESTA SEMANA')">Esta Semana</button>
        <button class="btn-neo-pill" [class.active]="filtroActivo === 'ESTE MES'" (click)="aplicarFiltro('ESTE MES')">Este Mes</button>
        <button class="btn-neo-pill" [class.active]="filtroActivo === 'HACE 3 MESES'" (click)="aplicarFiltro('HACE 3 MESES')">Últimos 3 Meses</button>
      </div>
      
      <div class="filter-group">
        <button class="btn-neo-pill outline" [class.active]="filtroActivo === 'PLAZO PERSONALIZADO'" (click)="aplicarFiltro('PLAZO PERSONALIZADO')">
          Rango Personalizado
        </button>
        <button class="btn-neo-pill ghost">Desde</button>
        <button class="btn-neo-pill ghost">Hasta</button>
      </div>
    </div>

    <!-- TARJETA DE LA TABLA -->
    <section class="table-card glass-panel">
      <div class="table-responsive">
        <table class="neo-table">
          <thead>
            <tr>
              <th>Fecha de escaneo</th>
              <th>Diagnóstico general</th>
              <th>Patología detectada</th>
              <th>Ubicación / Parcela</th>
            </tr>
          </thead>
          <tbody>
            <tr *ngIf="registrosAMostrar.length === 0">
              <td colspan="4" class="empty-state">
                No hemos encontrado diagnósticos en este período de tiempo.
              </td>
            </tr>
            
            <tr *ngFor="let item of registrosAMostrar">
              <td class="font-bold">{{ item.fecha }}</td>
              <td>
                <span class="status-badge" 
                      [ngClass]="{'is-positive': item.diagnostico === 'Positivo', 
                                  'is-negative': item.diagnostico === 'Negativo'}">
                  <span class="dot"></span> {{ item.diagnostico }}
                </span>
              </td>
              <td class="text-muted">{{ item.enfermedad }}</td>
              <td class="parcel-name">{{ item.parcela }}</td>
            </tr>
          </tbody>
        </table>
      </div>
    </section>

  </main>
</div>
