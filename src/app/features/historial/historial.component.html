<div class="innovative-wrapper">
  
  <!-- Navegación Flotante -->
  <header class="floating-nav glass-panel">
    <div class="brand-zone">
      <div class="menu-trigger" routerLink="/dashboard">
        <div class="dots"></div><div class="dots"></div><div class="dots"></div>
      </div>
      <div class="greeting">
        <span class="greeting-sub">REGISTRO CLÍNICO</span>
        <h1>Historial de Parcelas</h1>
      </div>
    </div>
    <div class="nav-actions">
      <button class="btn-neo-ghost" routerLink="/dashboard">Inicio</button>
      <button class="btn-neo-logout" (click)="cerrarSesion()">Salir</button>
    </div>
  </header>

  <div class="history-content">
    
    <!-- Filtros tipo "Píldora" -->
    <div class="filters-zone">
      <div class="filter-group">
        <button class="pill-filter" [class.active]="filtroActivo === 'HOY'" (click)="aplicarFiltro('HOY')">Hoy</button>
        <button class="pill-filter" [class.active]="filtroActivo === 'ESTA SEMANA'" (click)="aplicarFiltro('ESTA SEMANA')">Esta Semana</button>
        <button class="pill-filter" [class.active]="filtroActivo === 'ESTE MES'" (click)="aplicarFiltro('ESTE MES')">Este Mes</button>
        <button class="pill-filter" [class.active]="filtroActivo === 'HACE 3 MESES'" (click)="aplicarFiltro('HACE 3 MESES')">Últimos 3 Meses</button>
      </div>
      <div class="filter-group custom-range">
        <button class="pill-filter outline" [class.active]="filtroActivo === 'PLAZO PERSONALIZADO'" (click)="aplicarFiltro('PLAZO PERSONALIZADO')">Rango Personalizado</button>
        <button class="pill-filter ghost">Desde</button>
        <button class="pill-filter ghost">Hasta</button>
      </div>
    </div>

    <!-- Tabla en Cristal -->
    <div class="table-card glass-panel">
      <div class="table-responsive">
        <table class="neo-table">
          <thead>
            <tr>
              <th>Fecha</th>
              <th>Diagnóstico</th>
              <th>Enfermedad</th>
              <th>Parcela</th>
            </tr>
          </thead>
          <tbody>
            <tr *ngIf="registrosAMostrar.length === 0">
              <td colspan="4" class="empty-state">No se encontraron registros en este período.</td>
            </tr>
            
            <tr *ngFor="let item of registrosAMostrar">
              <td class="font-bold">{{ item.fecha }}</td>
              <td>
                <span class="status-pill" 
                      [ngClass]="{'is-positive': item.diagnostico === 'Positivo', 
                                  'is-negative': item.diagnostico === 'Negativo'}">
                  {{ item.diagnostico }}
                </span>
              </td>
              <td class="text-muted">{{ item.enfermedad }}</td>
              <td>{{ item.parcela }}</td>
            </tr>
          </tbody>
        </table>
      </div>
    </div>

  </div>
</div>
