<div class="dashboard-wrapper">
  
  <header class="top-bar">
    <div class="menu-left">
      <div class="menu-icon" routerLink="/dashboard">
        <span class="menu-text">INICIO</span>
        <div class="hamburger">
          <span></span><span></span><span></span>
        </div>
      </div>
      <h1>HOLA, {{ nombreUsuario | uppercase }}</h1> 
    </div>
    <div class="header-buttons">
      <button class="btn-nav" routerLink="/dashboard">INICIO</button>
      <button class="btn-logout" (click)="cerrarSesion()">CERRAR SESION</button>
    </div>
  </header>

  <div class="content">
    
    <div class="image-section">
      
      <div class="image-viewer">
        
        <div class="scanner-placeholder" *ngIf="!imagenUrl">
          <div class="corner top-left"></div>
          <div class="corner top-right"></div>
          <div class="center-line"></div>
          <div class="corner bottom-left"></div>
          <div class="corner bottom-right"></div>
        </div>

        <img *ngIf="imagenUrl" [src]="imagenUrl" class="uploaded-image">
      </div>

      <div class="action-buttons">
        <button class="btn-action green">TOMAR FOTO</button>
        
        <label class="btn-action blue">
          SUBIR IMAGEN
          <input type="file" (change)="onFileSelected($event)" accept="image/*" class="hidden-input">
        </label>
      </div>
    </div>

    <div class="result-section">
      <div class="result-card">
        
        <div class="result-header">
          <h3>RESULTADO</h3>
        </div>

        <div class="result-body">
          <div class="data-block">
            <p class="data-title">CONDICIÓN</p>
            <p class="data-value" *ngIf="estadoAnalisis === 'analizando'">Analizando.....</p>
            <p class="data-value" *ngIf="estadoAnalisis === 'completado'">{{ resultado.condicion }}</p>
          </div>

          <div class="data-block">
            <p class="data-title">CLASIFICACIÓN</p>
            <p class="data-value" *ngIf="estadoAnalisis === 'analizando'">Analizando.....</p>
            <p class="data-value" *ngIf="estadoAnalisis === 'completado'">{{ resultado.clasificacion }}</p>
          </div>

          <div class="data-block" *ngIf="estadoAnalisis === 'completado' || estadoAnalisis === 'analizando'">
            <p class="data-title">CONFIANZA DEL MODELO</p>
            <p class="data-value" *ngIf="estadoAnalisis === 'analizando'">Analizando.....</p>
            <p class="data-value" *ngIf="estadoAnalisis === 'completado'">{{ resultado.confianza }}</p>
          </div>
        </div>

      </div>
    </div>

  </div>
</div>
