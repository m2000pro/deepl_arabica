<div class="innovative-wrapper">
  
  <!-- Navegación Flotante -->
  <header class="floating-nav glass-panel">
    <div class="brand-zone">
      <div class="menu-trigger" routerLink="/dashboard">
        <div class="dots"></div><div class="dots"></div><div class="dots"></div>
      </div>
      <div class="greeting">
        <span class="greeting-sub">DIAGNÓSTICO CON IA</span>
        <h1>{{ nombreUsuario | uppercase }}</h1>
      </div>
    </div>
    <div class="nav-actions">
      <button class="btn-neo-ghost" routerLink="/dashboard">Inicio</button>
      <button class="btn-neo-logout" (click)="cerrarSesion()">Salir</button>
    </div>
  </header>

  <div class="dashboard-grid">
    
    <!-- COLUMNA IZQUIERDA: ESCÁNER -->
    <div class="scanner-module glass-panel flex-col">
      <div class="image-viewer">
        <div class="scanner-target" *ngIf="!imagenUrl">
          <div class="target-box">
            <div class="corner t-l"></div><div class="corner t-r"></div>
            <div class="scan-line"></div>
            <div class="corner b-l"></div><div class="corner b-r"></div>
          </div>
        </div>
        <img *ngIf="imagenUrl" [src]="imagenUrl" class="uploaded-image">
      </div>

      <div class="action-buttons">
        <button class="btn-neo-primary">TOMAR FOTO</button>
        <label class="btn-neo-secondary">
          SUBIR IMAGEN
          <input type="file" (change)="onFileSelected($event)" accept="image/*" class="hidden-input">
        </label>
      </div>
    </div>

    <!-- COLUMNA DERECHA: RESULTADOS -->
    <div class="results-module glass-panel">
      <div class="card-header">
        <h3>Resultado del Análisis</h3>
      </div>

      <div class="result-body">
        <div class="data-block">
          <span class="label">CONDICIÓN</span>
          <span class="value" *ngIf="estadoAnalisis === 'analizando'">Procesando...</span>
          <span class="value" *ngIf="estadoAnalisis === 'completado'">{{ resultado.condicion }}</span>
        </div>

        <div class="data-block highlight-block">
          <span class="label">CLASIFICACIÓN PRINCIPAL</span>
          <span class="value" *ngIf="estadoAnalisis === 'analizando'">Calculando...</span>
          <span class="value highlight-text" *ngIf="estadoAnalisis === 'completado'">
            {{ resultado.clasificacion }} ({{ resultado.confianza }})
          </span>
        </div>

        <div class="divider" *ngIf="estadoAnalisis === 'completado'"></div>

        <div class="probabilities-section" *ngIf="estadoAnalisis === 'completado'">
          <span class="label">PROBABILIDADES POR ENFERMEDAD</span>
          
          <div class="prob-row" *ngFor="let prob of probabilidades">
            <div class="prob-labels">
              <span class="prob-name">{{ prob.nombre }}</span>
              <span class="prob-value">{{ prob.porcentaje }}%</span>
            </div>
            <div class="prob-track">
              <div class="prob-fill" 
                   [style.width.%]="prob.porcentaje" 
                   [style.background-color]="prob.color">
              </div>
            </div>
          </div>
        </div>
      </div>
    </div>

  </div>
</div>
