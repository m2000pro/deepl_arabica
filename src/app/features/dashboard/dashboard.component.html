<div class="innovative-wrapper">
  
  <header class="floating-nav glass-panel">
    <div class="brand-zone">
      <div class="menu-trigger">
        <div class="dots"></div><div class="dots"></div><div class="dots"></div>
      </div>
      <div class="greeting">
        <span class="greeting-sub">BIENVENIDO DE VUELTA</span>
        <h1>{{ nombreUsuario | uppercase }}</h1>
      </div>
    </div>
    
    <button class="btn-neo-logout" (click)="cerrarSesion()">
      <span>Cerrar Sesión</span>
    </button>
  </header>

  <div class="dashboard-grid">
    
    <section class="scanner-module glass-panel">
      <div class="scanner-target">
        <div class="target-box">
          <div class="corner t-l"></div><div class="corner t-r"></div>
          <div class="scan-line"></div>
          <div class="corner b-l"></div><div class="corner b-r"></div>
        </div>
      </div>
      <div class="scanner-actions">
        <h2 class="module-title">Análisis de Cultivo</h2>
        <p class="module-desc">Sube o captura una imagen de la hoja para detectar patologías mediante IA.</p>
        <button class="btn-neo-primary" routerLink="/nuevo-diagnostico">
          INICIAR DIAGNÓSTICO
        </button>
      </div>
    </section>

    <section class="stats-module">
      
      <div class="stat-card glass-panel">
        <div class="card-header">
          <h3>Salud Semanal</h3>
          <button class="icon-btn" routerLink="/historial">→</button>
        </div>
        <div class="stat-body">
          <div class="stat-item">
            <span class="indicator cherry"></span>
            <div class="stat-info">
              <span class="label">Hojas Enfermas</span>
              <span class="value text-cherry">5</span>
            </div>
          </div>
          <div class="stat-item">
            <span class="indicator vibrant"></span>
            <div class="stat-info">
              <span class="label">Hojas Sanas</span>
              <span class="value text-vibrant">5</span>
            </div>
          </div>
        </div>
      </div>

      <div class="stat-card glass-panel">
        <div class="card-header">
          <h3>Clima Local</h3>
          <button class="icon-btn" routerLink="/reportes">→</button>
        </div>
        <div class="stat-body row-layout">
          <div class="stat-block">
            <span class="label">Temp</span>
            <span class="value text-vibrant">21°</span>
          </div>
          <div class="divider-vertical"></div>
          <div class="stat-block">
            <span class="label">Humedad</span>
            <span class="value">72%</span>
          </div>
        </div>
      </div>

    </section>
  </div>
</div>
