<div class="login-wrapper">
  <div class="login-card">
    
    <div class="logo-section">
      <svg class="leaf-logo" viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg">
        <path d="M12 21C12 21 4 15.5 4 9C4 5.5 6.5 3 10 3C11.5 3 12 4 12 4C12 4 12.5 3 14 3C17.5 3 20 5.5 20 9C20 15.5 12 21 12 21Z" fill="#8bc34a" stroke="#2D5A27" stroke-width="2"/>
        <path d="M12 21V10" stroke="#2D5A27" stroke-width="2" stroke-linecap="round"/>
      </svg>
      <h2>DeepL-Arabica</h2>
    </div>

    <form (ngSubmit)="iniciarSesion()">
      <div class="form-group">
        <label>USUARIO</label>
        <input 
          type="text" 
          name="usuario" 
          [(ngModel)]="usuario" 
          required>
      </div>

      <div class="form-group">
        <label>CONTRASEÑA</label>
        <input 
          type="password" 
          name="password" 
          [(ngModel)]="password" 
          required>
      </div>

      <div class="button-group">
        <button type="submit" class="btn-login">INICIAR SESION</button>
        <button type="button" class="btn-register" (click)="irARegistro()">REGISTRARSE</button>
      </div>
    </form>

  </div>
</div>
