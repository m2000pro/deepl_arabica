<div class="dashboard-wrapper">
  <header class="admin-header">
    <h1>⚙️ PANEL DE MONITOREO Y AUDITORÍA</h1>
    <div class="header-actions">
      <span class="admin-name">Admin: {{ nombreAdmin }}</span>
      <button class="btn-logout" (click)="cerrarSesion()">SALIR</button>
    </div>
  </header>

  <div class="content">
    <div class="crud-section">
      <h2>Agricultores Registrados</h2>
      
      <div *ngIf="cargando" class="loading-state">
        <h3>Conectando con la base de datos TiDB...</h3>
      </div>

      <div class="table-container" *ngIf="!cargando && usuarios.length > 0">
        <table class="admin-table">
          <thead>
            <tr>
              <th>ID</th>
              <th>Nombre</th>
              <th>Usuario</th>
              <th>Estado</th>
              <th>Acciones</th>
            </tr>
          </thead>
          <tbody>
            <tr *ngFor="let u of usuarios">
              <td class="text-muted">#{{ u.id }}</td>
              <td class="font-semibold">{{ u.nombre_completo }}</td>
              <td>@{{ u.usuario }}</td>
              <td>
                <span class="status-badge" [ngClass]="u.estado === 'Activo' ? 'active' : 'suspended'">
                  {{ u.estado || 'Activo' }}
                </span>
              </td>
              <td>
                <button (click)="cambiarEstado(u)" 
                        class="btn-action"
                        [ngClass]="u.estado === 'Activo' ? 'btn-suspend' : 'btn-activate'">
                  {{ u.estado === 'Activo' ? '⛔ Suspender' : '✅ Activar' }}
                </button>
              </td>
            </tr>
          </tbody>
        </table>
      </div>

      <div *ngIf="!cargando && usuarios.length === 0" class="empty-state">
        <p>No hay ningún agricultor registrado todavía.</p>
      </div>

    </div>
  </div>
</div>
