<div class="admin-wrapper">
  <div class="admin-card">
    
    <div class="card-header">
      <h2>PORTAL TÉCNICO</h2>
      <p>Acceso exclusivo para administradores TiDB</p>
    </div>

    <div class="card-body">
      <div class="alert error" *ngIf="errorMessage">{{ errorMessage }}</div>

      <form (ngSubmit)="onSubmit()" #adminForm="ngForm">
        <div class="form-group">
          <label>USUARIO TÉCNICO</label>
          <input type="text" name="usuario" [(ngModel)]="adminData.usuario" required placeholder="Ej. admin_root">
        </div>

        <div class="form-group">
          <label>CONTRASEÑA</label>
          <input type="password" name="contrasena" [(ngModel)]="adminData.contrasena" required placeholder="••••••••">
        </div>

        <button type="submit" class="btn-submit" [disabled]="adminForm.invalid || isLoading">
          {{ isLoading ? 'VERIFICANDO...' : 'INGRESAR AL SISTEMA' }}
        </button>
      </form>

      <div class="toggle-section">
        <a routerLink="/login" class="escape-link">← Volver al portal de agricultores</a>
      </div>
    </div>
    
  </div>
</div>
