<div class="admin-wrapper">
  <!-- Tarjeta con Glassmorphism Oscuro (Dark Roast) -->
  <div class="admin-card glass-panel dark-glass">
    
    <div class="card-header">
      <h2>PORTAL TÉCNICO</h2>
      <p class="subtitle">Acceso exclusivo para administradores del sistema</p>
    </div>

    <div class="card-body">
      
      <div class="alert error" *ngIf="errorMessage">{{ errorMessage }}</div>

      <form (ngSubmit)="onSubmit()" #adminForm="ngForm">
        
        <div class="input-group">
          <label>USUARIO (NICKNAME)</label>
          <input type="text" name="usuario" [(ngModel)]="adminData.usuario" required placeholder="Ingresa tu usuario">
        </div>

        <div class="input-group">
          <label>CONTRASEÑA</label>
          <input type="password" name="contrasena" [(ngModel)]="adminData.contrasena" required placeholder="••••••••">
        </div>

        <button type="submit" class="btn-submit-neo" [disabled]="adminForm.invalid || isLoading">
          {{ isLoading ? 'VERIFICANDO...' : 'INGRESAR AL PANEL' }}
        </button>

      </form>

      <div class="toggle-section">
        <a routerLink="/login" class="escape-link">← Volver al portal de agricultores</a>
      </div>

    </div>
  </div>
</div>
